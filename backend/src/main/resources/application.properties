spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.initialization-fail-timeout=-1

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.flyway.enabled=false
logging.level.org.hibernate.SQL=WARN
logging.level.io.pathora=DEBUG

server.port=${SERVER_PORT:80}
server.servlet.context-path=/api

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:15}
app.jwt.refresh-expiration-days=${JWT_REFRESH_EXPIRATION_DAYS:30}
app.resend.api-key=${RESEND_API_KEY:}
app.resend.from=${RESEND_FROM:Pathora <onboarding@resend.dev>}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

springdoc.swagger-ui.path=/swagger-ui.html
management.endpoints.web.exposure.include=health,info
