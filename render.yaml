services:
  - type: web
    name: pathora-api
    runtime: docker
    plan: free
    region: virginia
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/actuator/health
    autoDeployTrigger: commit
    maxShutdownDelaySeconds: 30
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION_MINUTES
        value: "15"
      - key: JWT_REFRESH_EXPIRATION_DAYS
        value: "30"
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: https://pathora.apec-engineer.com
      - key: FRONTEND_URL
        value: https://pathora.apec-engineer.com
      - key: SERVER_CONTEXT_PATH
        value: /api
      - key: CATALOG_INITIALIZE
        value: "false"
      - key: DB_POOL_MAX_SIZE
        value: "5"
      - key: DB_POOL_MIN_IDLE
        value: "1"
